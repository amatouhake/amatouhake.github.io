<!DOCTYPE html>
<html>
<head>
	<meta charset='utf-8' />
	<meta http-equiv='X-UA-Compatible' content='ie=edge' />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>HAKE</title>
	<meta name="description" content="マインクラフトで色々作ったりしてます。たまにプログラミングとかも。" />
	<meta name="keywords" content="マインクラフト,Minecraft,プログラミング" />
	<link rel="canonical" href="https://amatouhake.github.io/" />
	<link rel="icon" href="icon.ico">
	<link rel="apple-touch-icon-precomposed" href="icon.png" />
	<link rel="stylesheet" href="style.css" />
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato&display=swap">
	<style>
* {
	margin: 0;
	padding: 0;
	font-size: 1em;
	font-weight: normal;
	font-family: 'Lato', sans-serif;
}

#background {
	position: absolute;
	width: 100%;
	height: 3em;
	background: #000;
	z-index: 2;
}

h1 {
	position: absolute;
	left: 1em;
	top: 1em;
	font-weight: bold;
	color: #fff;
}

input {
	position: absolute;
	right: 0.5em;
	top: 0.5em;
	width: 2em;
	height: 2em;
	opacity: 0;
	z-index: 4;
}

#span span {
	position: absolute;
	right: 0.75em;
	top: 0.9em;
	width: 2em;
	height: 0.2em;
	background: #fff;
	transition-duration: 0.2s;
	z-index: 3;
}

#span span:nth-child(2) {
	top: 1.5em;
}

#span span:nth-child(3) {
	top: 2.1em;
}

input:checked ~ #span span {
	top: 1.5em;
	transform: rotate(45deg);
}

input:checked ~ #span span:nth-child(2) {
	transform: rotate(135deg);
}

#content {
	position: absolute;
	top: calc(3em - 50%);
	width: 100%;
	height: 50%;
	background: #151515;
	color: #fff;
	z-index: 1;
	transition-duration: 0.2s;
}

input:checked ~ #content {
	top: calc(7em - 50%);
}

canvas {
	width: 100%;
}
	</style>
</head>
<body>
	<header>
		<div id="background">
			<h1>HAKE</h1>
		</div>
		<input type="checkbox"></input>
		<div id="span">
			<span></span>
			<span></span>
			<span></span>
		</div>
		<div id="content"></div>
	</header>
	<script>
(window.onload = function() {
})();
	</script>
</body>
